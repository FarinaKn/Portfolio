            font-weight: 900;

            line-height: 1;
            color: var(--text);
        }
        .proj-page-year {
            font-family: var(--mono);

        }
        .proj-page-desc {
            font-size: 14px;
            color: var(--muted);
            line-height: 1.9;
            max-width: 600px;
        }

        /* ── Photo rows (full-width) ── */
        .photo-rows {
            padding: 0 0 80px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        @keyframes slider-scroll {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .prow-wrap {
            overflow: hidden;
            -webkit-mask: linear-gradient(90deg, transparent 0%, black 5%, black 95%, transparent 100%);
            mask: linear-gradient(90deg, transparent 0%, black 5%, black 95%, transparent 100%);
        }
        .prow-track {
            display: flex;
            align-items: center;
            gap: 12px;
            width: max-content;
            animation: slider-scroll var(--dur, 60s) linear infinite;
        }
        .prow-track:hover,
        .prow-track.paused {
            animation-play-state: paused;
        }
        .prow-track.reverse {
            animation-direction: reverse;
        }
        .pslide {
            flex-shrink: 0;
            height: 300px;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid var(--border);
            cursor: zoom-in;
            transition: border-color .3s;
        }
        .pslide:hover { border-color: rgba(255,255,255,.18); }
        .pslide img {
            height: 100%;
            width: auto;
            display: block;
            object-fit: cover;
        }

        /* ── Lightbox ── */
        .slide-backdrop {
            position: fixed; inset: 0;
            background: rgba(0,0,0,.92);
            z-index: 8999;
            cursor: zoom-out;
        }
        .slide-lightbox {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9000;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,.12);
            cursor: zoom-out;
            max-width: 92vw;
            max-height: 90vh;
            animation: lbIn .22s cubic-bezier(.16,1,.3,1);
        }
        @keyframes lbIn {
            from { opacity: 0; transform: translate(-50%,-50%) scale(.92); }
            to   { opacity: 1; transform: translate(-50%,-50%) scale(1); }
        }
        .slide-lightbox img {
            display: block;
            max-width: 92vw;
            max-height: 90vh;
            width: auto;
            height: auto;
            object-fit: contain;
        }

        .photo-page-footer {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 48px 80px;
            border-top: 1px solid var(--border);
            padding-top: 48px;
        }

        @media (max-width: 700px) {
            .photo-page-header { padding: 100px 24px 48px; }
            .pslide { height: 200px; }
            .photo-page-footer { padding: 32px 24px 60px; }
        }
    </style>
</head>

<script src="../script.js?v=6"></script>
<script>
(function() {
    let backdrop = null, lightbox = null, pausedTrack = null;
    function collapse() {
        if (lightbox)  { lightbox.remove();  lightbox  = null; }
        if (backdrop)  { backdrop.remove();  backdrop  = null; }
        if (pausedTrack) { pausedTrack.classList.remove('paused'); pausedTrack = null; }
    }
    document.querySelectorAll('.pslide').forEach(slide => {
        slide.addEventListener('click', () => {
            if (lightbox) { collapse(); return; }
            pausedTrack = slide.closest('.prow-track');
            if (pausedTrack) pausedTrack.classList.add('paused');
            const img = slide.querySelector('img');
            if (!img) return;
            const lb = document.createElement('div');
            lb.className = 'slide-lightbox';
            const lbImg = document.createElement('img');
            lbImg.src = img.src;
            lbImg.alt = img.alt;
            lb.appendChild(lbImg);
            lb.addEventListener('click', collapse);
            document.body.appendChild(lb);
            lightbox = lb;
            backdrop = document.createElement('div');
            backdrop.className = 'slide-backdrop';
            backdrop.addEventListener('click', collapse);
            document.body.appendChild(backdrop);
        });
    });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') collapse(); });
})();
</script>
